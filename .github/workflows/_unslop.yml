# @usage
#
# jobs:
#   unslop:
#     if: github.event_name == 'pull_request'
#     uses: MH4GF/shared-config/.github/workflows/_unslop.yml@main
#     with:
#       config: .textlintrc.json
#
on:
  workflow_call:
    inputs:
      config:
        description: textlint config path (relative to the caller repo root)
        type: string
        default: .textlintrc.json
      ignore-paths:
        description: |
          Newline-separated glob patterns to exclude from unslop.
          `*` matches a single path segment; `**` matches across `/`.
          Example: `wiki/raw/**` excludes every file under `wiki/raw/`.
        type: string
        default: ""

jobs:
  unslop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve unslop revision
        id: unslop-rev
        run: |
          sha=$(git ls-remote https://github.com/MH4GF/unslop HEAD | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache unslop binary
        id: cache-unslop
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cargo/bin/unslop
          key: unslop-${{ runner.os }}-${{ steps.unslop-rev.outputs.sha }}

      - name: Install unslop
        if: steps.cache-unslop.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/MH4GF/unslop --rev ${{ steps.unslop-rev.outputs.sha }} --locked

      - name: Collect changed Markdown files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          IGNORE_PATHS: ${{ inputs.ignore-paths }}
        run: |
          set -euo pipefail
          files=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.md' '*.mdx' || true)
          if [ -z "$files" ]; then
            echo "No changed Markdown files."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$IGNORE_PATHS" ]; then
            files=$(printf '%s\n' "$files" | awk '
              BEGIN {
                patterns = ENVIRON["IGNORE_PATHS"]
                n = split(patterns, pats, "\n")
                m = 0
                for (i = 1; i <= n; i++) {
                  p = pats[i]
                  if (p == "") continue
                  gsub(/[.+(){}|^$]/, "\\\\&", p)
                  gsub(/\*\*/, "@@D@@", p)
                  gsub(/\*/, "[^/]*", p)
                  gsub(/@@D@@/, ".*", p)
                  gsub(/\?/, "[^/]", p)
                  regexps[++m] = "^" p "$"
                }
              }
              {
                for (i = 1; i <= m; i++) {
                  if ($0 ~ regexps[i]) {
                    print "Ignored by ignore-paths: " $0 > "/dev/stderr"
                    next
                  }
                }
                print
              }
            ')
            if [ -z "$files" ]; then
              echo "All changed Markdown files matched ignore-paths."
              echo "files=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          ja_files=""
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            [ -r "$file" ] || continue
            if perl -CSD -0777 -ne 'exit(/\p{Hiragana}|\p{Katakana}|\p{Han}/ ? 0 : 1)' "$file" 2>/dev/null; then
              ja_files="${ja_files}${file}"$'\n'
            fi
          done <<< "$files"
          if [ -z "$ja_files" ]; then
            echo "No Japanese Markdown files changed."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "files<<__EOF__"
            printf '%s' "$ja_files"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run unslop on changed files
        if: steps.changed.outputs.files != ''
        env:
          FILES: ${{ steps.changed.outputs.files }}
          CONFIG: ${{ inputs.config }}
        run: |
          set -uo pipefail
          rc=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "::group::unslop $file"
            if ! unslop -c "$CONFIG" --no-color "$file"; then
              rc=1
            fi
            echo "::endgroup::"
          done <<< "$FILES"
          exit "$rc"
